<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Påskejagten 🐣</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --yellow: #f9e04b;
  --yellow-dark: #e6c800;
  --green: #5cb85c;
  --green-light: #d4edda;
  --purple: #b07fd3;
  --pink: #f5a7c7;
  --orange: #f4a83a;
  --bg: #fffbea;
  --card: #ffffff;
  --text: #3a2e00;
  --muted: #8a7a40;
  --border: #e8d870;
  --radius: 20px;
  --shadow: 0 4px 24px rgba(180,150,0,0.13);
}

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #fffbe6 0%, #e8f5e9 50%, #fce4ec 100%);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 60px;
  padding-bottom: max(60px, env(safe-area-inset-bottom));
  overscroll-behavior-y: none;
}

.container { max-width: 520px; width: 100%; }

/* ---- Decorative eggs (background) ---- */
.bg-eggs {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-egg {
  position: absolute;
  font-size: 2rem;
  opacity: 0.12;
  animation: floatEgg 8s ease-in-out infinite;
}
@keyframes floatEgg {
  0%,100% { transform: translateY(0) rotate(-10deg); }
  50%      { transform: translateY(-18px) rotate(10deg); }
}

/* ---- Header ---- */
.header {
  text-align: center;
  margin-bottom: 28px;
  position: relative; z-index: 1;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.5px;
  text-shadow: 0 2px 0 var(--yellow);
}
.header .subtitle {
  font-size: 1rem;
  color: var(--muted);
  margin-top: 4px;
}

/* ---- Progress ---- */
.progress-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
  position: relative; z-index: 1;
}
.prog-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #e0d9a0;
  border: 2px solid #c8bc60;
  transition: background 0.4s, transform 0.3s;
}
.prog-dot.done   { background: var(--green); border-color: #3d8b3d; }
.prog-dot.active { background: var(--yellow); border-color: var(--yellow-dark); transform: scale(1.3); }

/* ---- Card ---- */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 2px solid var(--border);
  padding: 28px 24px 24px;
  position: relative; z-index: 1;
  animation: fadeSlide 0.4s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.post-label {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
}

.post-title {
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 18px;
}

.egg-icon {
  font-size: 3.5rem;
  text-align: center;
  display: block;
  margin-bottom: 16px;
  animation: wobble 2.5s ease-in-out infinite;
}
@keyframes wobble {
  0%,100% { transform: rotate(-6deg) scale(1); }
  50%      { transform: rotate(6deg) scale(1.07); }
}

.riddle-box {
  background: linear-gradient(135deg, #fffde7, #fff9c4);
  border: 2px solid var(--yellow);
  border-radius: 14px;
  padding: 18px 20px;
  font-size: 1.1rem;
  line-height: 1.65;
  color: var(--text);
  margin-bottom: 22px;
  font-style: italic;
}

.hint {
  font-size: 0.88rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 20px;
  padding: 10px 14px;
  background: var(--green-light);
  border-radius: 10px;
  border: 1px solid #a8d5a8;
}
.hint strong { color: var(--green); }

.input-row {
  display: flex;
  gap: 10px;
}

input[type="text"] {
  flex: 1;
  padding: 14px 16px;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 2px solid var(--border);
  border-radius: 12px;
  outline: none;
  color: var(--text);
  background: #fffef5;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input[type="text"]:focus { border-color: var(--yellow-dark); }
input[type="text"].error { border-color: #e05252; animation: shake 0.4s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-7px); }
  40%,80% { transform: translateX(7px); }
}

button.go-btn {
  padding: 14px 20px;
  font-size: 1.4rem;
  background: var(--yellow);
  border: 2px solid var(--yellow-dark);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  -webkit-appearance: none;
}
button.go-btn:active { transform: scale(0.93); background: var(--yellow-dark); }

.error-msg {
  color: #c0392b;
  font-size: 0.88rem;
  margin-top: 8px;
  text-align: center;
  font-weight: 600;
  min-height: 20px;
}

/* ---- Start screen ---- */
.start-screen {
  text-align: center;
}
.start-screen .big-egg { font-size: 6rem; display: block; margin: 10px auto 20px; animation: wobble 2s ease-in-out infinite; }
.start-screen p { font-size: 1.08rem; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

button.start-btn {
  width: 100%;
  padding: 18px;
  font-size: 1.25rem;
  font-weight: 900;
  background: var(--yellow);
  border: 3px solid var(--yellow-dark);
  border-radius: 16px;
  cursor: pointer;
  color: var(--text);
  letter-spacing: 0.5px;
  transition: transform 0.15s, background 0.15s;
  -webkit-appearance: none;
}
button.start-btn:active { transform: scale(0.96); background: var(--yellow-dark); }

/* ---- Finish screen ---- */
.finish-screen { text-align: center; }
.finish-screen .trophy { font-size: 5rem; display: block; margin: 0 auto 16px; animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-14px) scale(1.08); } }
.finish-screen h2 { font-size: 2rem; font-weight: 900; color: var(--text); margin-bottom: 12px; }
.finish-screen .final-clue {
  background: linear-gradient(135deg, #fff9c4, #ffe57f);
  border: 2px solid var(--yellow-dark);
  border-radius: 16px;
  padding: 20px;
  font-size: 1.15rem;
  line-height: 1.7;
  color: var(--text);
  margin: 16px 0 24px;
  font-weight: 600;
}
button.reset-btn {
  padding: 12px 28px;
  font-size: 1rem;
  font-weight: 700;
  background: #f5f5f5;
  border: 2px solid #ccc;
  border-radius: 12px;
  cursor: pointer;
  color: #666;
  -webkit-appearance: none;
}

/* ---- Confetti ---- */
.confetti-piece {
  position: fixed;
  top: -30px;
  width: 12px; height: 16px;
  border-radius: 3px;
  opacity: 0.9;
  animation: confettiFall linear forwards;
  pointer-events: none;
  z-index: 100;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ---- Correct flash ---- */
.correct-flash {
  position: fixed; inset: 0;
  background: rgba(92,184,92,0.25);
  pointer-events: none;
  z-index: 50;
  animation: flashGreen 0.5s forwards;
}
@keyframes flashGreen { 0% { opacity:1; } 100% { opacity:0; } }
</style>
</head>
<body>

<!-- Background decorative eggs -->
<div class="bg-eggs" id="bgEggs"></div>

<div class="container">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;
    text-decoration:none;color:var(--muted);font-size:0.9rem;font-weight:600;
    margin-bottom:12px;padding:6px 12px;background:rgba(255,255,255,0.6);
    border-radius:10px;border:1px solid var(--border);">
    ← Matematik
  </a>
  <!-- Header (hidden on start screen) -->
  <div class="header" id="mainHeader" style="display:none">
    <h1>🐣 Påskejagten</h1>
    <p class="subtitle">Find alle 8 æg og vind påskeskatten!</p>
  </div>

  <!-- Progress dots -->
  <div class="progress-bar" id="progressBar" style="display:none">
    <div class="prog-dot" id="dot0"></div>
    <div class="prog-dot" id="dot1"></div>
    <div class="prog-dot" id="dot2"></div>
    <div class="prog-dot" id="dot3"></div>
    <div class="prog-dot" id="dot4"></div>
    <div class="prog-dot" id="dot5"></div>
    <div class="prog-dot" id="dot6"></div>
    <div class="prog-dot" id="dot7"></div>
  </div>

  <!-- Card -->
  <div class="card" id="mainCard"></div>
</div>

<script>
const POSTS = [
  {
    icon: "🌳",
    title: "Post 1: Den store grønne",
    riddle: "Jeg er høj og rank, og mine rødder går dybt i jorden. Om foråret springer mine blade ud. Fugle elsker at sidde i mine grene og synge. Hvad er jeg?",
    hint: "Find det skjulte æg ved foden af mig i haven!",
    password: "SOMMERFUGL",
    display_password: "SOMMERFUGL"
  },
  {
    icon: "🌸",
    title: "Post 2: Blomstens vogter",
    riddle: "Jeg er rund og fyldt med jord. En blomst bor i mig og drikker vand igennem mig. Jeg kan stå på terrassen eller langs stien. Hvad er jeg?",
    hint: "Kig under mig eller bag mig i haven!",
    password: "REGNORM",
    display_password: "REGNORM"
  },
  {
    icon: "🪑",
    title: "Post 3: Solskinspladsen",
    riddle: "Jeg inviterer dig til at sætte dig ned og nyde solen. Jeg er lavet af træ og har plads til hele familien. Du finder mig i haven. Hvad er jeg?",
    hint: "Kig under mig — ægget gemmer sig der!",
    password: "MARIEHØNE",
    display_password: "MARIEHØNE"
  },
  {
    icon: "🚿",
    title: "Post 4: Planternes bedste ven",
    riddle: "Jeg drikker masser af vand og giver det videre til blomster og planter. Jeg har en lang hals og et hoved med mange små huller. Hvad er jeg?",
    hint: "Find mig i haven ved planterne eller skuret — ægget er gemt tæt på!",
    password: "REGNBUE",
    display_password: "REGNBUE"
  },
  {
    icon: "🏚️",
    title: "Post 5: Det lille hus",
    riddle: "Jeg er et lille hus, men ingen mennesker bor i mig. Jeg passer på redskaber, havegrej og cykler. Hvad er jeg?",
    hint: "Find ægget gemt foran eller bag mig!",
    password: "SNEGL",
    display_password: "SNEGL"
  },
  {
    icon: "🌿",
    title: "Post 6: Den grønne mur",
    riddle: "Jeg er grøn og vokser langs kanten af haven. Jeg beskytter jer mod vind og nysgerrige naboer. Om sommeren klipper man mig. Hvad er jeg?",
    hint: "Søg langs mig — ægget er gemt et sted nede ved mig!",
    password: "PINDSVIN",
    display_password: "PINDSVIN"
  },
  {
    icon: "🐦",
    title: "Post 7: Fuglenes lille hjem",
    riddle: "Jeg hænger i et træ og er et lille hus til fugle. De flyver ind og ud af mit lille runde hul. Om foråret bygger de rede i mig. Hvad er jeg?",
    hint: "Kig ved foden af det træ, jeg hænger i!",
    password: "SOLSIKKE",
    display_password: "SOLSIKKE"
  },
  {
    icon: "🌞",
    title: "Post 8: Den store finale!",
    riddle: "Tillykke — du er næsten fremme! Den STORE påskeskat gemmer sig der, hvor familien samles udenfor og spiser mad på varme dage. Det er et bord i haven. Hvad er det?",
    hint: "Kig under det, og find din påskeskat! Skriv svaret for at vinde!",
    password: "CHOKOLADE",
    display_password: "CHOKOLADE",
    isFinal: true
  }
];

let current = -1; // -1 = start screen

function norm(s) {
  return s.trim().toUpperCase()
    .replace(/Æ/g,'Æ').replace(/Ø/g,'Ø').replace(/Å/g,'Å')
    .replace(/AE/g,'Æ').replace(/OE/g,'Ø').replace(/AA/g,'Å');
}

function renderBgEggs() {
  const emojis = ['🥚','🐣','🐰','🌷','🌸','🌼'];
  const el = document.getElementById('bgEggs');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'bg-egg';
    d.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    d.style.left = Math.random() * 100 + '%';
    d.style.top  = Math.random() * 100 + '%';
    d.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    d.style.animationDelay = (Math.random() * 6) + 's';
    d.style.animationDuration = (5 + Math.random() * 6) + 's';
    el.appendChild(d);
  }
}

function updateProgress() {
  document.getElementById('progressBar').style.display = current >= 0 ? 'flex' : 'none';
  document.getElementById('mainHeader').style.display  = current >= 0 ? 'block' : 'none';
  for (let i = 0; i < 8; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'prog-dot' + (i < current ? ' done' : i === current ? ' active' : '');
  }
}

function renderStart() {
  current = -1;
  updateProgress();
  document.getElementById('mainCard').innerHTML = `
    <div class="start-screen">
      <span class="big-egg">🐣</span>
      <p>Velkommen til <strong>Påskejagten</strong>!<br>
      Der er 8 poster gemt rundt i haven.<br>
      Løs gåden, find det skjulte æg med kodeordet, og skriv det ind for at komme videre.<br><br>
      <strong>God jagt — og god påske! 🌷</strong></p>
      <button class="start-btn" onclick="nextPost()">🐰 Start påskejagten!</button>
    </div>`;
}

function renderPost(idx) {
  const p = POSTS[idx];
  document.getElementById('mainCard').innerHTML = `
    <div class="post-label">Post ${idx + 1} af 8</div>
    <div class="post-title">${p.title}</div>
    <span class="egg-icon">${p.icon}</span>
    <div class="riddle-box">🥚 ${p.riddle}</div>
    <div class="hint">🔍 <strong>Hvad skal du gøre:</strong> ${p.hint}</div>
    <div class="input-row">
      <input type="text" id="answerInput" placeholder="Kodeord…" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        onkeydown="if(event.key==='Enter') checkAnswer()">
      <button class="go-btn" onclick="checkAnswer()">✅</button>
    </div>
    <div class="error-msg" id="errMsg"></div>`;
  setTimeout(() => { const el = document.getElementById('answerInput'); if(el) el.focus(); }, 100);
}

function renderFinish() {
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'none';
  document.getElementById('mainCard').innerHTML = `
    <div class="finish-screen">
      <span class="trophy">🏆</span>
      <h2>Tillykke! Du klarede det!</h2>
      <p style="color:var(--muted);font-size:1rem;margin-bottom:0">Du fandt alle 8 æg og løste alle gåderne.<br>Nu er det tid til at hente din belønning:</p>
      <div class="final-clue">
        🎁 Løb hen til <strong>havebordet</strong> og kig <strong>under det</strong> — der venter påskeskatten på dig! 🐰🍫🌷
      </div>
      <button class="reset-btn" onclick="renderStart()">↩ Start forfra</button>
    </div>`;
  launchConfetti();
}

function nextPost() {
  current++;
  if (current >= POSTS.length) { renderFinish(); return; }
  updateProgress();
  renderPost(current);
}

function checkAnswer() {
  const input = document.getElementById('answerInput');
  if (!input) return;
  const val = norm(input.value);
  const correct = norm(POSTS[current].password);
  if (val === correct) {
    // Flash green
    const flash = document.createElement('div');
    flash.className = 'correct-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
    // Mini confetti
    spawnConfetti(20);
    setTimeout(nextPost, 400);
  } else {
    input.classList.add('error');
    document.getElementById('errMsg').textContent = '❌ Det er ikke det rigtige kodeord — prøv igen!';
    setTimeout(() => { input.classList.remove('error'); input.value = ''; input.focus(); }, 600);
  }
}

function launchConfetti() {
  spawnConfetti(80);
  setTimeout(() => spawnConfetti(60), 600);
  setTimeout(() => spawnConfetti(40), 1200);
}

function spawnConfetti(count) {
  const colors = ['#f9e04b','#5cb85c','#b07fd3','#f5a7c7','#f4a83a','#4fc3f7','#ef5350'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (8 + Math.random() * 10) + 'px';
    el.style.height = (10 + Math.random() * 14) + 'px';
    el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

renderBgEggs();
renderStart();
</script>
</body>
</html>
